<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>GB-bot Mobile App</title>
  <style>
    :root{
      --bg1:#4b41b7;
      --bg2:#7b70e4;
      --ink:#25215e;
      --muted:#a6a2bd;
      --purple:#7162db;
      --purple-dark:#4a3db1;
      --purple-soft:#eeeafd;
      --orange:#ff651a;
      --orange2:#ff7d23;
      --green:#28df8f;
      --line:#ddd8f4;
      --card:#ffffffee;
      --shadow:0 16px 38px rgba(66,53,151,.16), 0 6px 14px rgba(66,53,151,.08);
      --radius:24px;
    }

    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0;
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans TC","PingFang TC","Microsoft JhengHei",Arial,sans-serif;
      color:var(--ink);
      background:radial-gradient(circle at 80% 10%,#fff 0,#f3efff 42%,#ddd8ff 100%);
    }

    .phone{
      width:min(430px,100vw);
      min-height:100svh;
      margin:0 auto;
      position:relative;
      overflow:hidden;
      background:
        radial-gradient(circle at 20% -5%,rgba(255,255,255,.35),transparent 38%),
        linear-gradient(165deg,var(--bg1),var(--bg2) 28%,#f8f6ff 28.2%,#fff 100%);
      box-shadow:0 0 0 1px rgba(255,255,255,.5) inset;
    }

    .safe{padding:calc(env(safe-area-inset-top) + 22px) 20px calc(env(safe-area-inset-bottom) + 14px)}

    header{
      display:grid;
      grid-template-columns:auto auto 1fr;
      align-items:center;
      gap:12px;
      color:white;
      margin-bottom:12px;
    }
    .bot{
      width:58px;height:58px;border-radius:50%;
      display:block;
      box-shadow:0 12px 22px rgba(32,26,116,.22), inset 0 0 0 4px rgba(255,255,255,.16);
    }
    h1{margin:0;font-size:30px;line-height:1;font-weight:900;white-space:nowrap;text-shadow:0 8px 16px rgba(26,20,96,.18)}
    .pill{
      display:flex;align-items:center;gap:8px;
      justify-self:end;
      padding:12px 14px;
      border-radius:999px;
      background:rgba(255,255,255,.18);
      backdrop-filter:blur(14px);
      box-shadow:inset 0 1px 0 rgba(255,255,255,.18);
      font-size:13px;font-weight:850;white-space:nowrap;
    }
    .dot{width:10px;height:10px;border-radius:50%;background:var(--green);box-shadow:0 0 12px var(--green)}
    .round-btn{
      width:46px;height:46px;border:0;border-radius:50%;
      background:rgba(255,255,255,.18);
      color:#fff;display:grid;place-items:center;
      box-shadow:inset 0 1px 0 rgba(255,255,255,.2);
    }
    .round-btn svg{width:23px;height:23px;stroke:currentColor;stroke-width:2.4;fill:none;stroke-linecap:round;stroke-linejoin:round}

    main{display:flex;flex-direction:column;gap:12px;padding-bottom:12px}

    .nav-card{
      background:rgba(255,255,255,.94);
      border:1px solid rgba(214,209,242,.85);
      border-radius:20px;
      box-shadow:0 14px 28px rgba(66,53,151,.12);
      padding:10px 12px 12px;
      display:grid;
      grid-template-columns:repeat(4,1fr);
      gap:6px;
      margin-bottom:2px;
    }
    .nav-item{
      min-height:66px;
      border:0;
      background:transparent;
      border-radius:14px;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      gap:6px;
      color:#5e598d;
      font-family:inherit;
      font-weight:850;
      font-size:11px;
      text-align:center;
      cursor:pointer;
      appearance:none;
      -webkit-tap-highlight-color:transparent;
      transition:background .16s ease, color .16s ease, transform .08s ease;
    }
    .nav-item:active{transform:translateY(1px)}
    .nav-item svg{width:23px;height:23px;stroke:currentColor;stroke-width:2.2;fill:none;stroke-linecap:round;stroke-linejoin:round}
    .nav-item.active{background:#f2effb;color:var(--orange)}

    .card{
      background:var(--card);
      border:1px solid rgba(214,209,242,.88);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      padding:18px 14px 16px;
      backdrop-filter:blur(10px);
    }
    .card h2{
      margin:0 0 14px 4px;
      color:#5149ba;
      font-size:21px;
      line-height:1;
      font-weight:900;
      text-transform:lowercase;
    }
    textarea,.output-box{
      width:100%;
      min-height:164px;
      border:1.5px solid var(--line);
      border-radius:16px;
      background:linear-gradient(180deg,#fff,#fbfaff);
      color:var(--ink);
      padding:16px;
      font-size:16px;
      line-height:1.55;
      outline:none;
      resize:vertical;
      box-shadow:inset 0 1px 0 rgba(255,255,255,.8);
    }
    textarea::placeholder{color:#a4a0ba;font-weight:750}
    .output-box{
      min-height:176px;
      position:relative;
      overflow:hidden;
    }
    .output-box:before{
      content:"";
      position:absolute;inset:0;
      opacity:.32;
      background:
        radial-gradient(circle at 95% 28%, transparent 0 45px, rgba(116,98,224,.08) 46px 48px, transparent 49px),
        repeating-radial-gradient(circle at 95% 28%, transparent 0 16px, rgba(116,98,224,.13) 17px 18px, transparent 19px 28px),
        radial-gradient(ellipse at 30% 87%,rgba(116,98,224,.25) 0 1px,transparent 2px),
        radial-gradient(ellipse at 35% 82%,rgba(116,98,224,.2) 0 1px,transparent 2px);
      background-size:auto,auto,12px 12px,15px 15px;
      pointer-events:none;
    }
    .btn-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:16px}
    .btn{
      border:0;border-radius:16px;
      min-height:52px;
      color:#fff;
      font-size:17px;
      font-weight:850;
      letter-spacing:.2px;
      display:flex;align-items:center;justify-content:center;gap:10px;
      box-shadow:0 10px 18px rgba(72,54,174,.22);
      cursor:pointer;
    }
    .btn svg{width:22px;height:22px;stroke:currentColor;stroke-width:2.5;fill:none;stroke-linecap:round;stroke-linejoin:round;flex:0 0 auto}
    .btn.purple{background:linear-gradient(135deg,#8f82ee,#6657d2)}
    .btn.orange{background:linear-gradient(135deg,#ff7e22,#ff5b16);box-shadow:0 10px 18px rgba(255,99,26,.24)}
    .btn.full{width:100%;margin-top:16px;background:linear-gradient(135deg,#8d7ff0,#6758d1)}
    .btn:active{transform:translateY(1px)}

    footer{
      display:flex;justify-content:center;gap:12px;align-items:center;
      color:#656189;
      font-weight:700;font-size:12px;
      padding:3px 0 2px;
      white-space:nowrap;
    }
    footer span:not(:last-child):after{content:"|";margin-left:12px;color:#d8d3ed}
    .home-indicator{width:132px;height:5px;border-radius:99px;background:#111;margin:8px auto 0;opacity:.95}

    @media (max-width:380px){
      .safe{padding-left:14px;padding-right:14px}
      header{gap:8px}.bot{width:50px;height:50px}h1{font-size:27px}.pill{font-size:11px;padding:10px 10px}
      .nav-card{grid-template-columns:repeat(4,1fr);padding:8px 10px}.nav-item{font-size:10px;min-height:62px}.nav-item svg{width:21px;height:21px}
      textarea,.output-box{min-height:132px}.output-box{min-height:148px}
      .btn{min-height:46px;font-size:15px}
      footer{font-size:10px;gap:8px}footer span:not(:last-child):after{margin-left:8px}
    }
  </style>
</head>
<body>
  <div class="phone safe">
    <header>
      <img class="bot" src="avatar.png" alt="GB-bot" />
      <h1>GB-bot</h1>
      <div class="pill"><i class="dot"></i>系統狀態：正常</div>
    </header>

    <main>
      <nav class="nav-card" aria-label="功能選單">
        <button class="nav-item active" type="button" data-placeholder="請輸入噴頭系統相關問題..." data-label="噴頭系統">
          <svg viewBox="0 0 24 24"><path d="M12 2l2 3 3 .5 1 3 3 2-1 3 1 3-3 2-1 3-3 .5-2 3-2-3-3-.5-1-3-3-2 1-3-1-3 3-2 1-3 3-.5z"/><circle cx="12" cy="12" r="3"/></svg>
          <span>噴頭系統</span>
        </button>
        <button class="nav-item" type="button" data-placeholder="請輸入墨水系統相關問題..." data-label="墨水系統">
          <svg viewBox="0 0 24 24"><path d="M9 3c-4 4-5 8-2 12 2 3 6 4 9 2 3-2 4-6 2-9"/><path d="M15 3c3 3 4 6 2 9"/></svg>
          <span>墨水系統</span>
        </button>
        <button class="nav-item" type="button" data-placeholder="請輸入收送布處理相關問題..." data-label="收送布處理">
          <svg viewBox="0 0 24 24"><path d="M6 2h9l3 3v17H6z"/><path d="M14 2v5h5"/><path d="M9 13h6M9 17h6"/></svg>
          <span>收送布處理</span>
        </button>
        <button class="nav-item" type="button" data-placeholder="請輸入系統狀態相關問題..." data-label="系統狀態">
          <svg viewBox="0 0 24 24"><path d="M12 2v13"/><path d="M8 15a4 4 0 1 0 8 0"/></svg>
          <span>系統狀態</span>
        </button>
        <button class="nav-item" type="button" data-placeholder="請輸入連線與通訊相關問題..." data-label="連線與通訊">
          <svg viewBox="0 0 24 24"><path d="M5 13a10 10 0 0 1 14 0"/><path d="M8 16a6 6 0 0 1 8 0"/><path d="M11 19a2 2 0 0 1 2 0"/></svg>
          <span>連線與通訊</span>
        </button>
        <button class="nav-item" type="button" data-placeholder="請輸入定位系統相關問題..." data-label="定位系統">
          <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="7"/><path d="M12 2v4M12 18v4M2 12h4M18 12h4"/><circle cx="12" cy="12" r="2"/></svg>
          <span>定位系統</span>
        </button>
        <button class="nav-item" type="button" data-placeholder="請輸入機械系統相關問題..." data-label="機械系統">
          <svg viewBox="0 0 24 24"><path d="M12 2l1.5 3 3.5.5.5 3.5 3 1.5-3 1.5-.5 3.5-3.5.5L12 22l-1.5-3-3.5-.5-.5-3.5-3-1.5 3-1.5.5-3.5 3.5-.5z"/><circle cx="12" cy="12" r="3"/></svg>
          <span>機械系統</span>
        </button>
      </nav>

      <section class="card">
        <h2>prompt</h2>
        <textarea id="prompt" placeholder="請輸入您的問題..."></textarea>
        <div class="btn-row">
          <button class="btn purple" id="clearBtn" aria-label="清除">
            <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M12 7v9"/><path d="M8.5 12.5 12 16l3.5-3.5"/></svg>
            <span>Clear</span>
          </button>
          <button class="btn orange" id="submitBtn" aria-label="送出">
            <svg viewBox="0 0 24 24"><path d="M22 2 11 13"/><path d="M22 2 15 22l-4-9-9-4z"/></svg>
            <span>Submit</span>
          </button>
        </div>
      </section>

      <section class="card">
        <h2>output</h2>
        <div class="output-box" id="output"></div>
        <button class="btn full" aria-label="標記">
          <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M12 7v9"/><path d="M8.5 12.5 12 16l3.5-3.5"/></svg>
          <span>Flag</span>
        </button>
      </section>
    </main>

    <footer>
      <span>Use via API 🚀</span>
      <span>Built with Gradio 🤗</span>
      <span>Settings ⚙️</span>
    </footer>
    <div class="home-indicator"></div>
  </div>

  <script>
    const prompt = document.querySelector('#prompt');
    const output = document.querySelector('#output');
    const navButtons = document.querySelectorAll('.nav-item');

    navButtons.forEach((btn) => {
      btn.addEventListener('click', () => {
        navButtons.forEach((item) => item.classList.remove('active'));
        btn.classList.add('active');

        const text = btn.dataset.placeholder || `請輸入${btn.dataset.label || ''}相關問題...`;
        prompt.placeholder = text;
        prompt.value = text;
        output.textContent = '';
        prompt.focus();
      });
    });

    document.querySelector('#clearBtn').addEventListener('click', () => {
      prompt.value = '';
      output.textContent = '';
    });
    document.querySelector('#submitBtn').addEventListener('click', () => {
      const text = prompt.value.trim();
      output.textContent = text ? `已收到指令：${text}\n\n目前系統狀態正常，請等待 GB-bot 回傳處理結果。` : '請先輸入您的問題。';
    });
  </script>
</body>
</html>
